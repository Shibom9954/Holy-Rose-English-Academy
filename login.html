<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Holy Rose English Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: #0b1a13; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; font-family: 'Poppins', sans-serif;">

    <div class="login-card" style="background: #0e2219; padding: 40px; border-radius: 20px; border: 1px solid #d4af37; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center;">
        
        <img src="Gemini_Generated_Image_xybrtqxybrtqxybr-removebg-preview.png" alt="Logo" style="width: 80px; margin-bottom: 15px; filter: drop-shadow(0 0 10px #d4af37);">
        
        <h2 style="color: #d4af37; margin-bottom: 5px;">SCHOOL LOGIN</h2>
        <p style="color: #ccc; font-size: 14px; margin-bottom: 30px;">Access your Dashboard</p>

        <form action="#" style="display: flex; flex-direction: column; gap: 20px;">
            
            <div style="text-align: left;">
                <label style="color: #d4af37; font-size: 12px; font-weight: bold; margin-bottom: 5px; display: block;">LOGIN AS:</label>
                <select style="width: 100%; padding: 12px; background: #1a3328; border: 1px solid #333; color: white; border-radius: 8px; outline: none;">
                    <option value="admin">Administrator</option>
                    <option value="teacher">Teacher</option>
                    <option value="student">Student</option>
                </select>
            </div>

            <div style="position: relative; text-align: left;">
                <i class="fas fa-user" style="position: absolute; left: 12px; top: 40px; color: #d4af37;"></i>
                <label style="color: #d4af37; font-size: 12px; font-weight: bold; margin-bottom: 5px; display: block;">USERNAME</label>
                <input type="text" placeholder="Enter ID" required style="width: 100%; padding: 12px 12px 12px 40px; background: #1a3328; border: 1px solid #333; color: white; border-radius: 8px; outline: none; box-sizing: border-box;">
            </div>

            <div style="position: relative; text-align: left;">
                <i class="fas fa-lock" style="position: absolute; left: 12px; top: 40px; color: #d4af37;"></i>
                <label style="color: #d4af37; font-size: 12px; font-weight: bold; margin-bottom: 5px; display: block;">PASSWORD</label>
                <input type="password" placeholder="••••••••" required style="width: 100%; padding: 12px 12px 12px 40px; background: #1a3328; border: 1px solid #333; color: white; border-radius: 8px; outline: none; box-sizing: border-box;">
            </div>

            <a href="forgot-password.html" style="color: #d4af37; font-size: 12px; text-decoration: none; text-align: right;">Forgot Password?</a>

            <button type="submit" style="padding: 15px; background: #d4af37; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; color: #000; font-size: 16px;">
                LOGIN TO SYSTEM
            </button>

        </form>

        <p style="margin-top: 30px; font-size: 11px; color: #555;">
            © 2026 ERP System | Holy Rose English Academy
        </p>
    </div>

</body>
</html>
