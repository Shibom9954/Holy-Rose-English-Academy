<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students | Admin</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: flex; background: #08120d; font-family: 'Poppins', sans-serif; color: white; margin: 0; }
        
        /* Sidebar (Same as Dashboard) */
        .sidebar { width: 260px; height: 100vh; background: #0e2219; border-right: 1px solid #d4af37; position: fixed; }
        .sidebar-menu { padding: 20px; list-style: none; }
        .sidebar-menu li { padding: 15px; border-radius: 8px; margin-bottom: 5px; cursor: pointer; color: #ccc; transition: 0.3s; }
        .sidebar-menu li.active { background: #d4af37; color: #000; font-weight: bold; }
        .sidebar-menu a { text-decoration: none; color: inherit; display: block; }

        .main-content { margin-left: 260px; width: 100%; padding: 40px; }

        /* Action Bar */
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .add-btn { background: #d4af37; color: #000; padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* Table Styling */
        .student-table { width: 100%; border-collapse: collapse; background: #0e2219; border-radius: 15px; overflow: hidden; border: 1px solid rgba(212,175,55,0.1); }
        .student-table th { background: rgba(212,175,55,0.1); color: #d4af37; text-align: left; padding: 15px; }
        .student-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-badge { padding: 5px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .status-active { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }

        /* Modal (Hidden by default) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #0e2219; padding: 30px; border-radius: 20px; border: 1px solid #d4af37; width: 500px; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; color: #d4af37; font-size: 12px; margin-bottom: 5px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #1a3328; border: 1px solid #333; color: white; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="padding: 30px; text-align: center;">
            <h4 style="color: #d4af37;">ADMIN PANEL</h4>
        </div>
        <ul class="sidebar-menu">
            <li><a href="admin-dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li class="active"><i class="fas fa-user-graduate"></i> Students</li>
            <li onclick="window.location.href='admin-teachers.html'"><i class="fas fa-chalkboard-teacher"></i> Teachers</li>
            <li><i class="fas fa-money-check-alt"></i> Fees</li>
            <li onclick="window.location.href='admin-attendance-master.html'"><i class="fas fa-calendar-check"></i> Attendance</li>
            <li><i class="fas fa-cog"></i> Settings</li>
            <li style="margin-top: 50px; color: #ff4d4d;"><i class="fas fa-sign-out-alt"></i> Logout</li>


        </ul>
    </div>

    <div class="main-content">
        <div class="action-bar">
            <h2>Manage Students</h2>
            <button class="add-btn" onclick="openModal()"><i class="fas fa-plus"></i> Add New Student</button>
        </div>

        <table class="student-table">
            <thead>
                <tr>
                    <th>Roll No</th>
                    <th>Name</th>
                    <th>Class</th>
                    <th>Parent Name</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>101</td>
                    <td>Ayan Ahmed</td>
                    <td>Class 9</td>
                    <td>M. Ahmed</td>
                    <td><span class="status-badge status-active">Active</span></td>
                    <td>
                        <button style="background:none; border:none; color:#d4af37; cursor:pointer;"><i class="fas fa-edit"></i></button>
                        <button style="background:none; border:none; color:#ff4d4d; cursor:pointer; margin-left:10px;"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
                </tbody>
        </table>
    </div>

    <div class="modal" id="studentModal">
        <div class="modal-content">
            <h3 style="color: #d4af37; margin-bottom: 20px;">Register New Student</h3>
            <form>
                <div class="form-group">
                    <label>FULL NAME</label>
                    <input type="text" placeholder="Enter student name">
                </div>
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>CLASS</label>
                        <select>
                            <option>Nursery</option>
                            <option>Class 1</option>
                            <option>Class 9</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>ROLL NUMBER</label>
                        <input type="number" placeholder="Roll No">
                    </div>
                </div>
                <div class="form-group">
                    <label>PARENT'S CONTACT</label>
                    <input type="tel" placeholder="+91 XXXXX XXXXX">
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" onclick="closeModal()" style="flex: 1; padding: 12px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer;">Cancel</button>
                    <button type="submit" style="flex: 2; padding: 12px; background: #d4af37; color: black; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Save Student</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openModal() { document.getElementById('studentModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('studentModal').style.display = 'none'; }
    </script>
</body>
</html>
