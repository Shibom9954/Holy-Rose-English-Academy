<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Master | Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { display: flex; background: #08120d; font-family: 'Poppins', sans-serif; color: white; margin: 0; }
        .sidebar { width: 260px; height: 100vh; background: #0e2219; border-right: 1px solid #d4af37; position: fixed; }
        .sidebar-menu { padding: 20px; list-style: none; }
        .sidebar-menu li { padding: 15px; border-radius: 8px; margin-bottom: 5px; cursor: pointer; color: #ccc; transition: 0.3s; }
        .sidebar-menu li.active { background: #d4af37; color: #000; font-weight: bold; }
        .sidebar-menu a { text-decoration: none; color: inherit; display: block; }

        .main-content { margin-left: 260px; width: 100%; padding: 40px; box-sizing: border-box; }
        
        /* Tab System */
        .tab-container { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 10px; }
        .tab-btn { padding: 12px 25px; cursor: pointer; border-radius: 8px; border: 1px solid #d4af37; background: transparent; color: #d4af37; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: #d4af37; color: black; }

        /* Sections */
        .attendance-section { display: none; }
        .attendance-section.active { display: block; }

        .filter-bar { background: #0e2219; padding: 20px; border-radius: 12px; display: flex; gap: 15px; margin-bottom: 20px; align-items: flex-end; border: 1px solid rgba(255,255,255,0.05); }
        .input-group { display: flex; flex-direction: column; gap: 5px; flex: 1; }
        .input-group label { font-size: 11px; color: #d4af37; }
        .input-group select, .input-group input { padding: 10px; background: #1a3328; border: 1px solid #333; color: white; border-radius: 5px; }

        table { width: 100%; border-collapse: collapse; background: #0e2219; border-radius: 15px; overflow: hidden; }
        th { background: rgba(212,175,55,0.1); color: #d4af37; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .status-badge { padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; border: 1px solid #444; }
        .p-btn:hover, .p-active { background: #4CAF50; color: white; border-color: #4CAF50; }
        .a-btn:hover, .a-active { background: #f44336; color: white; border-color: #f44336; }

        .submit-btn { background: #d4af37; color: black; border: none; padding: 15px 40px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; float: right; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="padding: 30px; text-align: center;"><h4 style="color: #d4af37;">ADMIN PANEL</h4></div>
        <ul class="sidebar-menu">
            <li><a href="admin-dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a></li>
            <li><a href="admin-students.html"><i class="fas fa-user-graduate"></i> Students</a></li>
            <li onclick="window.location.href='admin-teachers.html'"><i class="fas fa-chalkboard-teacher"></i> Teachers</li>
            <li><a href="admin-fees.html"><i class="fas fa-money-check-alt"></i> Fees</a></li>
            <li class="active"><i class="fas fa-calendar-check"></i> Attendance</li>
            <li style="margin-top: 50px; color: #ff4d4d;"><a href="login.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
        </ul>
    </div>

    <div class="main-content">
        <h2>Attendance Master</h2>

        <div class="tab-container">
            <button class="tab-btn active" onclick="showTab('student-att', this)">STUDENT ATTENDANCE</button>
            <button class="tab-btn" onclick="showTab('staff-att', this)">STAFF / TEACHER ATTENDANCE</button>
        </div>

        <div id="student-att" class="attendance-section active">
            <div class="filter-bar">
                <div class="input-group">
                    <label>CLASS</label>
                    <select><option>Class 9</option><option>Class 10</option></select>
                </div>
                <div class="input-group">
                    <label>DATE</label>
                    <input type="date" value="2026-04-05">
                </div>
                <button class="tab-btn" style="height: 42px;">LOAD STUDENTS</button>
            </div>
            <table>
                <thead><tr><th>Roll No</th><th>Name</th><th>Attendance</th></tr></thead>
                <tbody>
                    <tr><td>101</td><td>Ayan Ahmed</td>
                        <td><span class="status-badge p-active">Present</span> <span class="status-badge">Absent</span></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div id="staff-att" class="attendance-section">
            <div class="filter-bar">
                <div class="input-group">
                    <label>SELECT DATE</label>
                    <input type="date" value="2026-04-05">
                </div>
                <div class="input-group" style="flex: 2;">
                    <label>QUICK SEARCH STAFF</label>
                    <input type="text" placeholder="Teacher Name or ID">
                </div>
                <button class="tab-btn" style="height: 42px;">REFRESH STAFF</button>
            </div>
            <table>
                <thead><tr><th>Staff ID</th><th>Name</th><th>In-Time</th><th>Out-Time</th><th>Status</th></tr></thead>
                <tbody>
                    <tr><td>T-101</td><td>S. K. Mazumder</td>
                        <td><input type="time" value="08:00" style="background:#1a3328; border:none; color:white; padding:5px;"></td>
                        <td><input type="time" value="14:30" style="background:#1a3328; border:none; color:white; padding:5px;"></td>
                        <td><select style="background:#1a3328; color:white; border:1px solid #d4af37;"><option>Present</option><option>Late</option><option>Absent</option></select></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <button class="submit-btn">SAVE ALL RECORDS</button>
    </div>

    <script>
        function showTab(tabId, btn) {
            // Hide all sections
            document.querySelectorAll('.attendance-section').forEach(sec => sec.classList.remove('active'));
            // Deactivate all buttons
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            // Show selected section & activate button
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
