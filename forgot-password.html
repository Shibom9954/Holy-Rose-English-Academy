<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Holy Rose English Academy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: #0b1a13; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; font-family: 'Poppins', sans-serif;">

    <div class="reset-card" style="background: #0e2219; padding: 40px; border-radius: 20px; border: 1px solid #d4af37; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center;">
        
        <div style="width: 70px; height: 70px; background: rgba(212, 175, 55, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; border: 1px solid #d4af37;">
            <i class="fas fa-key" style="font-size: 30px; color: #d4af37;"></i>
        </div>
        
        <h2 style="color: #d4af37; margin-bottom: 10px;">FORGOT PASSWORD?</h2>
        <p style="color: #ccc; font-size: 13px; margin-bottom: 25px; line-height: 1.5;">
            Don't worry! Enter your registered email address below and we'll send you a password reset link.
        </p>

        <form action="#" style="display: flex; flex-direction: column; gap: 20px;">
            
            <div style="position: relative; text-align: left;">
                <i class="fas fa-envelope" style="position: absolute; left: 12px; top: 40px; color: #d4af37;"></i>
                <label style="color: #d4af37; font-size: 11px; font-weight: bold; margin-bottom: 5px; display: block; letter-spacing: 1px;">REGISTERED EMAIL</label>
                <input type="email" placeholder="example@email.com" required style="width: 100%; padding: 12px 12px 12px 40px; background: #1a3328; border: 1px solid #333; color: white; border-radius: 8px; outline: none; box-sizing: border-box;">
            </div>

            <button type="submit" style="padding: 14px; background: #d4af37; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; color: #000; font-size: 14px; letter-spacing: 1px;">
                SEND RESET LINK
            </button>

            <a href="login.html" style="color: #ccc; font-size: 13px; text-decoration: none; margin-top: 10px;">
                <i class="fas fa-arrow-left" style="font-size: 11px; margin-right: 5px;"></i> Back to Login
            </a>

        </form>

        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);">
            <p style="font-size: 11px; color: #555;">
    Facing issues? <a href="it-support.html" style="color: #d4af37; text-decoration: none;">Contact School IT Support</a>
</p>
        </div>
    </div>

</body>
</html>
